<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ATS Job Matcher</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="nav-logo">
      <span class="logo-icon">A</span>
      <span class="logo-text">ATS Job Matcher</span>
    </div>
    <div class="nav-tag">by Janarthanan S</div>
  </nav>

  <!-- HERO -->
  <div class="hero">
    <h1>Check Your ATS Score</h1>
    <p>Paste your resume and job description to instantly see how well you match</p>
  </div>

  <!-- INPUT SECTION -->
  <div class="container">
    <div class="input-grid">
      <div class="input-card">
        <label>Your Resume</label>
        <textarea id="resume" placeholder="Paste your full resume text here..."></textarea>
      </div>
      <div class="input-card">
        <label>Job Description</label>
        <textarea id="jd" placeholder="Paste the job description from LinkedIn/Naukri..."></textarea>
      </div>
    </div>

    <button class="analyze-btn" onclick="analyze()">
      Analyze My ATS Score
    </button>

    <!-- LOADER -->
    <div class="loader" id="loader">
      <div class="spinner"></div>
      <p>Analyzing your resume...</p>
    </div>

    <!-- RESULTS -->
    <div class="results" id="results">

      <!-- SCORE CARDS -->
      <div class="score-grid">
        <div class="score-card main-score">
          <p class="card-label">ATS Score</p>
          <p class="card-value" id="score-value">0%</p>
          <p class="card-status" id="score-status">-</p>
        </div>
        <div class="score-card">
          <p class="card-label">Matched Keywords</p>
          <p class="card-value green" id="matched-count">0</p>
        </div>
        <div class="score-card">
          <p class="card-label">Missing Keywords</p>
          <p class="card-value red" id="missing-count">0</p>
        </div>
      </div>

      <!-- PROGRESS BAR -->
      <div class="progress-section">
        <div class="progress-header">
          <span>Match Progress</span>
          <span id="progress-label">0%</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
      </div>

      <!-- ADVICE -->
      <div class="advice-box" id="advice-box">
        <span id="advice-text"></span>
      </div>

      <!-- KEYWORDS -->
      <div class="keywords-grid">
        <div class="keyword-card">
          <p class="keyword-title green">Matched Keywords</p>
          <div class="badges" id="matched-badges"></div>
        </div>
        <div class="keyword-card">
          <p class="keyword-title red">Missing Keywords</p>
          <div class="badges" id="missing-badges"></div>
        </div>
      </div>

    </div>
  </div>

  <script src="/static/script.js"></script>
</body>
</html>
